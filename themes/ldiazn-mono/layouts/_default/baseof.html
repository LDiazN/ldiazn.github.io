<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" href="{{ "/favicon.ico" | absURL }}">
  <link rel="stylesheet" href="{{ "/css/reset.css" | absURL }}">
  <link rel="stylesheet" href="{{ "/css/index.css" | absURL }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script src="{{ "/js/index.js" | absURL }}"></script>
  {{ block "footer_scripts" . }}{{ end }}
</body>
</html>
