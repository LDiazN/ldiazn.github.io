{{ if .Site.Params.show_footer }}
  <hr>
  <footer>
    {{ with .Site.Data.home.footer_entries }}
      <ul class="nav-list">
        {{ range . }}
          <li><a href="{{ if hasPrefix .url "http" }}{{ .url }}{{ else }}{{ if hasPrefix .url "/" }}{{ .url }}{{ else }}/{{ .url }}{{ end }}{{ end }}">{{ .title }}</a></li>
        {{ end }}
      </ul>
    {{ end }}
  </footer>
{{ end }}
