baseURL = "https://ldiazn.github.io/"
title = "Luis Diaz"
author = "Luis Diaz"
theme = "ldiazn-mono"

# Use date from filename (e.g. 2024-02-05-foo.md) when front matter has no date
[frontmatter]
  date = [":filename", ":default"]

[params]
  subtitle = "Software engineer"
  github_url = "https://github.com/ldiazn"
  linkedin_url = "https://www.linkedin.com/in/ldiazn-cs"
  twitter_url = "https://twitter.com/Luduz98"
  description = "Hi! My name is Luis Diaz, I'm a Computer Engineer and I'm passionate about science, technology, video games, visual arts and software engineering. I work professionally as a software developer and I'm also interested in Game Technology, Computer Graphics, and 3D animation. Sometimes I also enjoy writing about things I do and find interesting. Visit my blog to learn more about my interests and explore my projects to see what I enjoy working on!"
  show_navbar = true
  show_footer = true
  show_projects = true
  show_blog = true
  show_old_projects = false
  show_misc_list = false
  show_reading_time = true
  show_tags = true
  show_description = true
  show_copyright = false
  date_format = "2006-01-02"
  back_home_text = "home.."

  [params.home]
    title_projects = "Projects"
    title_misc_list = "Details"
    title_blog = "Blog"
    title_old_projects = "Old Projects"
    n_projects = 3
    n_blogs = 3

[permalinks]
  blog = "/:slug/"

[outputs]
  home = ["HTML", "RSS"]

# No tag/category list pages
disableKinds = ["taxonomy", "taxonomyTerm"]
